<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAJU MVP - 구독 기능</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      margin: 0;
      color: #666;
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr 300px;
      gap: 16px;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .pol-list,
    .room-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pol-item,
    .room-item {
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .room-item.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .room-item.active .item-meta {
      color: #ddd;
    }

    .item-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .item-meta {
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }

    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #444;
    }

    select,
    textarea,
    input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      border: none;
      background: #111;
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    button.secondary {
      background: #e9e9e9;
      color: #111;
    }

    button.full {
      width: 100%;
    }

    .chat-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 320px;
    }

    .msg-wrap {
      display: flex;
      justify-content: flex-start;
    }

    .msg {
      max-width: 85%;
      background: #f1f1f1;
      padding: 12px 14px;
      border-radius: 16px;
    }

    .msg-name {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .msg-text {
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
    }

    .msg-time {
      margin-top: 8px;
      text-align: right;
      font-size: 11px;
      color: #777;
    }

    .notice {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
    }

    .status {
      font-size: 13px;
      color: #0a7a2f;
      margin-top: 10px;
    }

    .error {
      font-size: 13px;
      color: #c62828;
      margin-top: 10px;
    }

    .top-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    @media (max-width: 640px) {
      .top-row {
        grid-template-columns: 1fr;
      }
    }

    .room-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .room-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
    }

    .pill {
      display: inline-block;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f0f0f0;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>MAJU MVP</h1>
      <p class="sub">정치인 구독 + 내 채팅방 목록 버전</p>
    </div>

    <div class="layout">
      <div>
        <div class="card">
          <h2 class="section-title">전체 정치인</h2>
          <div id="politicianList" class="pol-list"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <div class="top-row">
            <div>
              <label for="role">역할</label>
              <select id="role">
                <option value="supporter">지지자</option>
                <option value="politician">정치인</option>
              </select>
            </div>

            <div>
              <label for="senderName">발신자 이름</label>
              <input id="senderName" placeholder="정치인 이름" />
            </div>
          </div>

          <div class="pill" id="roomBadge">내 채팅방</div>
          <div class="room-title" id="roomTitle">채팅방</div>
          <div class="room-sub" id="roomSub">오른쪽 내 채팅방에서 하나를 선택해줘</div>

          <div id="chat" class="chat-box"></div>
        </div>

        <div class="card">
          <label for="message">메시지 보내기</label>
          <textarea id="message" placeholder="선택한 정치인의 지지자들에게 보낼 메시지를 입력하세요"></textarea>
          <button onclick="sendMessage()">전송</button>
          <div id="status"></div>
          <div class="notice">현재 MVP에서는 정치인만 메시지를 보낼 수 있어.</div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2 class="section-title">내 채팅방</h2>
          <div id="myRooms" class="room-list"></div>
          <div class="notice">구독한 정치인만 여기에 보여.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCoSymM-VyiR-byo7ytvBlwDjD8wl6qb8E",
      authDomain: "majumvp-30932.firebaseapp.com",
      projectId: "majumvp-30932",
      storageBucket: "majumvp-30932.firebasestorage.app",
      messagingSenderId: "514523492394",
      appId: "1:514523492394:web:4ff8a63d079963cf219353"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const politicians = [
      {
        id: "lee-jungmin",
        name: "이정민",
        party: "미래도시당",
        bio: "청년 일자리와 지역 혁신"
      },
      {
        id: "park-seoyun",
        name: "박서윤",
        party: "국민연결당",
        bio: "주거·복지·생활 정책"
      },
      {
        id: "kim-hyunjoo",
        name: "김현주",
        party: "새로운내일당",
        bio: "교육·지역 균형 발전"
      }
    ];

    const demoUserId = "demo-user-001";
    let selectedPoliticianId = null;
    let subscribedIds = [];
    let unsubscribeMessages = null;
    let unsubscribeSubscriptions = null;

    const politicianListEl = document.getElementById("politicianList");
    const myRoomsEl = document.getElementById("myRooms");
    const roomTitleEl = document.getElementById("roomTitle");
    const roomSubEl = document.getElementById("roomSub");
    const roomBadgeEl = document.getElementById("roomBadge");
    const chatEl = document.getElementById("chat");
    const roleEl = document.getElementById("role");
    const senderNameEl = document.getElementById("senderName");
    const messageEl = document.getElementById("message");
    const statusEl = document.getElementById("status");

    function setStatus(text, isError = false) {
      statusEl.className = isError ? "error" : "status";
      statusEl.textContent = text;
    }

    function formatTime(date) {
      const hours = date.getHours();
      const minutes = String(date.getMinutes()).padStart(2, "0");
      const period = hours < 12 ? "오전" : "오후";
      const hour12 = hours % 12 === 0 ? 12 : hours % 12;
      return `${period} ${hour12}:${minutes}`;
    }

    function getPoliticianById(id) {
      return politicians.find((p) => p.id === id);
    }

    function renderPoliticianList() {
      politicianListEl.innerHTML = "";

      politicians.forEach((p) => {
        const subscribed = subscribedIds.includes(p.id);

        const item = document.createElement("div");
        item.className = "pol-item";

        const name = document.createElement("div");
        name.className = "item-name";
        name.textContent = p.name;

        const meta = document.createElement("div");
        meta.className = "item-meta";
        meta.textContent = `${p.party} · ${p.bio}`;

        const actions = document.createElement("div");
        actions.className = "action-row";

        const subscribeBtn = document.createElement("button");
        subscribeBtn.textContent = subscribed ? "구독중" : "구독하기";
        subscribeBtn.className = subscribed ? "secondary" : "";
        subscribeBtn.onclick = () => {
          if (subscribed) {
            unsubscribePolitician(p.id);
          } else {
            subscribePolitician(p.id);
          }
        };

        const openBtn = document.createElement("button");
        openBtn.textContent = "채팅방 보기";
        openBtn.className = "secondary";
        openBtn.onclick = () => {
          selectedPoliticianId = p.id;
          renderMyRooms();
          renderRoomInfo();
          listenMessages();
        };

        actions.appendChild(subscribeBtn);
        actions.appendChild(openBtn);

        item.appendChild(name);
        item.appendChild(meta);
        item.appendChild(actions);

        politicianListEl.appendChild(item);
      });
    }

    function renderMyRooms() {
      myRoomsEl.innerHTML = "";

      if (subscribedIds.length === 0) {
        myRoomsEl.innerHTML = "<div class='notice'>아직 구독한 정치인이 없어.</div>";
        return;
      }

      subscribedIds.forEach((id) => {
        const p = getPoliticianById(id);
        if (!p) return;

        const item = document.createElement("div");
        item.className = "room-item" + (selectedPoliticianId === id ? " active" : "");
        item.onclick = () => {
          selectedPoliticianId = id;
          renderMyRooms();
          renderRoomInfo();
          listenMessages();
        };

        const name = document.createElement("div");
        name.className = "item-name";
        name.textContent = p.name;

        const meta = document.createElement("div");
        meta.className = "item-meta";
        meta.textContent = `${p.party} · ${p.bio}`;

        item.appendChild(name);
        item.appendChild(meta);
        myRoomsEl.appendChild(item);
      });
    }

    function renderRoomInfo() {
      if (!selectedPoliticianId) {
        roomBadgeEl.textContent = "내 채팅방";
        roomTitleEl.textContent = "채팅방";
        roomSubEl.textContent = "오른쪽 내 채팅방에서 하나를 선택해줘";
        senderNameEl.value = "";
        chatEl.innerHTML = "<div class='notice'>채팅방을 선택해줘.</div>";
        return;
      }

      const p = getPoliticianById(selectedPoliticianId);
      if (!p) return;

      roomBadgeEl.textContent = subscribedIds.includes(selectedPoliticianId) ? "구독 중인 채팅방" : "미리보기 채팅방";
      roomTitleEl.textContent = p.name + " 채팅방";
      roomSubEl.textContent = p.party + " · " + p.bio;
      senderNameEl.value = p.name;
    }

    function renderMessages(docs) {
      chatEl.innerHTML = "";

      if (docs.length === 0) {
        chatEl.innerHTML = "<div class='notice'>이 채팅방에는 아직 메시지가 없어.</div>";
        return;
      }

      docs.forEach((doc) => {
        const data = doc.data();

        const wrap = document.createElement("div");
        wrap.className = "msg-wrap";

        const box = document.createElement("div");
        box.className = "msg";

        const name = document.createElement("div");
        name.className = "msg-name";
        name.textContent = data.senderName || "정치인";

        const text = document.createElement("div");
        text.className = "msg-text";
        text.textContent = data.text || "";

        const time = document.createElement("div");
        time.className = "msg-time";
        if (data.createdAt && data.createdAt.toDate) {
          time.textContent = formatTime(data.createdAt.toDate());
        } else {
          time.textContent = "방금 전";
        }

        box.appendChild(name);
        box.appendChild(text);
        box.appendChild(time);
        wrap.appendChild(box);
        chatEl.appendChild(wrap);
      });
    }

    function listenMessages() {
      if (unsubscribeMessages) unsubscribeMessages();

      if (!selectedPoliticianId) {
        chatEl.innerHTML = "<div class='notice'>채팅방을 선택해줘.</div>";
        return;
      }

      setStatus("메시지 불러오는 중...");
      chatEl.innerHTML = "<div class='notice'>불러오는 중...</div>";

      unsubscribeMessages = db
        .collection("politicians")
        .doc(selectedPoliticianId)
        .collection("messages")
        .orderBy("createdAt", "asc")
        .onSnapshot(
          (snapshot) => {
            renderMessages(snapshot.docs);
            setStatus("불러오기 완료");
          },
          (error) => {
            console.error(error);
            setStatus("메시지를 불러오지 못했어. Firestore 설정을 확인해줘.", true);
          }
        );
    }

    async function subscribePolitician(politicianId) {
      try {
        await db
          .collection("users")
          .doc(demoUserId)
          .collection("subscriptions")
          .doc(politicianId)
          .set({
            politicianId: politicianId,
            subscribedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
      } catch (error) {
        console.error(error);
        setStatus("구독 실패", true);
      }
    }

    async function unsubscribePolitician(politicianId) {
      try {
        await db
          .collection("users")
          .doc(demoUserId)
          .collection("subscriptions")
          .doc(politicianId)
          .delete();

        if (selectedPoliticianId === politicianId) {
          selectedPoliticianId = subscribedIds.filter((id) => id !== politicianId)[0] || null;
        }
      } catch (error) {
        console.error(error);
        setStatus("구독 취소 실패", true);
      }
    }

    function listenSubscriptions() {
      unsubscribeSubscriptions = db
        .collection("users")
        .doc(demoUserId)
        .collection("subscriptions")
        .orderBy("subscribedAt", "asc")
        .onSnapshot(
          (snapshot) => {
            subscribedIds = snapshot.docs.map((doc) => doc.id);

            if (!selectedPoliticianId && subscribedIds.length > 0) {
              selectedPoliticianId = subscribedIds[0];
            }

            if (selectedPoliticianId && !subscribedIds.includes(selectedPoliticianId)) {
              selectedPoliticianId = subscribedIds[0] || null;
            }

            renderPoliticianList();
            renderMyRooms();
            renderRoomInfo();
            listenMessages();
          },
          (error) => {
            console.error(error);
            setStatus("구독 목록을 불러오지 못했어.", true);
          }
        );
    }

    async function sendMessage() {
      const role = roleEl.value;
      const text = messageEl.value.trim();

      if (!selectedPoliticianId) {
        alert("채팅방을 먼저 선택해줘.");
        return;
      }

      const senderName = senderNameEl.value.trim() || getPoliticianById(selectedPoliticianId).name;

      if (role !== "politician") {
        alert("현재 MVP에서는 정치인만 메시지를 보낼 수 있습니다.");
        return;
      }

      if (!text) {
        alert("메시지를 입력해줘.");
        return;
      }

      try {
        setStatus("전송 중...");
        await db
          .collection("politicians")
          .doc(selectedPoliticianId)
          .collection("messages")
          .add({
            senderName: senderName,
            politicianId: selectedPoliticianId,
            text: text,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });

        messageEl.value = "";
        setStatus("전송 완료");
      } catch (error) {
        console.error(error);
        setStatus("전송 실패. Firebase 설정이나 권한을 확인해줘.", true);
      }
    }

    renderPoliticianList();
    renderMyRooms();
    renderRoomInfo();
    listenSubscriptions();
  </script>
</body>
</html>
