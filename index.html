<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAJU MVP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.5;
    }
    h1 {
      margin-bottom: 8px;
    }
    .box {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .msg {
      background: #f3f3f3;
      padding: 10px 14px;
      border-radius: 12px;
      margin: 8px 0;
    }
    textarea {
      width: 100%;
      height: 100px;
      margin-top: 8px;
      padding: 10px;
    }
    button {
      margin-top: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>MAJU MVP</h1>
  <p>정치인이 지지자에게 1:다수로 메시지를 보내는 데모</p>

  <div class="box">
    <label for="role">역할 선택:</label>
    <select id="role">
      <option value="supporter">지지자</option>
      <option value="politician">정치인</option>
    </select>
  </div>

  <div class="box">
    <h3>채팅방</h3>
    <div id="chat"></div>
  </div>

  <div class="box">
    <h3>메시지 보내기</h3>
    <textarea id="message" placeholder="메시지를 입력하세요"></textarea>
    <br />
    <button onclick="sendMessage()">전송</button>
  </div>

  <script>
    const messages = [
      "안녕하세요. 오늘 공약 관련 의견을 받고 싶습니다.",
      "이번 주 일정도 곧 공유드릴게요."
    ];

    function render() {
      const chat = document.getElementById("chat");
      chat.innerHTML = "";
      messages.forEach((m) => {
        const div = document.createElement("div");
        div.className = "msg";
        div.textContent = "정치인: " + m;
        chat.appendChild(div);
      });
    }

    function sendMessage() {
      const role = document.getElementById("role").value;
      const input = document.getElementById("message");
      const text = input.value.trim();

      if (!text) return;

      if (role !== "politician") {
        alert("현재 MVP에서는 정치인만 메시지를 보낼 수 있습니다.");
        return;
      }

      messages.push(text);
      input.value = "";
      render();
    }

    render();
  </script>
</body>
</html>
