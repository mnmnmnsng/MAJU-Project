<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAJU MVP - Auth 로그인 분리</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .sub { margin: 0; color: #666; font-size: 14px; }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr 300px;
      gap: 16px;
    }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }

    .section-title { margin: 0 0 12px; font-size: 18px; }
    .pol-list, .room-list { display: flex; flex-direction: column; gap: 10px; }

    .pol-item, .room-item {
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }
    .room-item.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .room-item.active .item-meta { color: #ddd; }

    .item-name { font-weight: 700; margin-bottom: 4px; }
    .item-meta { font-size: 13px; color: #666; line-height: 1.4; }

    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #444;
    }

    select, textarea, input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      border: none;
      background: #111;
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { opacity: 0.92; }
    button.secondary {
      background: #e9e9e9;
      color: #111;
    }

    .chat-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 320px;
    }

    .msg-wrap {
      display: flex;
      justify-content: flex-start;
    }

    .msg {
      max-width: 85%;
      background: #f1f1f1;
      padding: 12px 14px;
      border-radius: 16px;
    }

    .msg-name {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .msg-text {
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
    }

    .msg-time {
      margin-top: 8px;
      text-align: right;
      font-size: 11px;
      color: #777;
    }

    .notice { font-size: 13px; color: #666; margin-top: 10px; }
    .status { font-size: 13px; color: #0a7a2f; margin-top: 10px; }
    .error { font-size: 13px; color: #c62828; margin-top: 10px; }

    .room-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .room-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
    }

    .pill {
      display: inline-block;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f0f0f0;
      margin-bottom: 10px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .user-box {
      font-size: 14px;
      color: #444;
      background: #f5f5f5;
      padding: 10px 12px;
      border-radius: 12px;
    }

    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .auth-modal {
      width: 100%;
      max-width: 460px;
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .auth-title {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 700;
    }

    .auth-sub {
      margin: 0 0 16px;
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .auth-tabs button.active {
      background: #111;
      color: white;
    }

    .hidden { display: none; }

    .field-group { margin-bottom: 12px; }

    #politicianSelectWrap.hidden {
      display: none;
    }
  </style>
</head>

    function formatTime(date) {
      const hours = date.getHours();
      const minutes = String(date.getMinutes()).padStart(2, "0");
      const period = hours < 12 ? "오전" : "오후";
      const hour12 = hours % 12 === 0 ? 12 : hours % 12;
      return `${period} ${hour12}:${minutes}`;
    }

function startPoliticiansListener() {
  if (unsubscribePoliticians) unsubscribePoliticians();

  unsubscribePoliticians = db.collection("politicians").onSnapshot((snapshot) => {
    politicians = snapshot.docs.map((doc) => ({

    async function handleAuthSubmit() {
      const name = authNameEl.value.trim();
      const email = authEmailEl.value.trim();
      const password = authPasswordEl.value.trim();

      authErrorEl.textContent = "";

      if (!email || !password) {
        authErrorEl.textContent = "이메일과 비밀번호를 입력해줘.";
        return;
      }

      try {
        if (authMode === "signup") {
          if (!name) {
            authErrorEl.textContent = "회원가입 시 이름을 입력해줘.";
            return;
          }

          const userCredential = await auth.createUserWithEmailAndPassword(email, password);
          const user = userCredential.user;

          const profile = {
            name,
            email,
            role: authRole,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          };

          if (authRole === "politician") {
            const politicianId = authPoliticianIdEl.value.trim();
            const party = authPartyEl.value.trim();
            const bio = authBioEl.value.trim();

            if (!politicianId || !party || !bio) {
              authErrorEl.textContent = "정치인 아이디, 정당, 소개를 다 입력해줘.";
              return;
            }

            profile.politicianId = politicianId;

            await db.collection("politicians").doc(politicianId).set({
              name,
              party,
              bio
            });
          }

          await db.collection("users").doc(user.uid).set(profile);
        } else {
          await auth.signInWithEmailAndPassword(email, password);
        }

        authNameEl.value = "";
        authEmailEl.value = "";
        authPasswordEl.value = "";
      } catch (error) {
        console.error(error);
        authErrorEl.textContent = error.message || "로그인/회원가입에 실패했어.";
      }
    }

    async function logoutUser() {
      try {
        await auth.signOut();
      } catch (error) {
        console.error(error);
      }
    }

        meta.textContent = `${p.party} · ${p.bio}`;

        item.appendChild(name);
        item.appendChild(meta);
        myRoomsEl.appendChild(item);

        myRoomsEl.innerHTML = "<div class='notice'>아직 구독한 정치인이 없어.</div>";

    return;
  }

  if (docs.length === 0) {
    questionListEl.innerHTML = "<div class='notice'>아직 질문이 없어.</div>";
    return;
  }

  docs.forEach((doc) => {
    const data = doc.data();

    const item = document.createElement("div");
    item.className = "room-item";

    const name = document.createElement("div");
    name.className = "item-name";
    name.textContent =
      currentProfile.role === "politician"
        ? (data.supporterName || "익명 지지자")
        : "내가 보낸 질문";

    const meta = document.createElement("div");
    meta.className = "item-meta";
    meta.textContent = data.text || "";

    item.appendChild(name);
    item.appendChild(meta);
    questionListEl.appendChild(item);
  });
}

function listenQuestions() {

    .collection("politicians")

  if (currentProfile.role === "supporter") {
    query = query.where("supporterUid", "==", currentUser.uid);

  unsubscribeQuestions = query.onSnapshot(
    (snapshot) => {
      renderQuestions(snapshot.docs);

    (error) => {
      console.error(error);

    function listenMessages() {
      if (unsubscribeMessages) unsubscribeMessages();

      unsubscribeMessages = db
        .collection("politicians")
        .doc(selectedPoliticianId)
        .collection("messages")
        .orderBy("createdAt", "asc")
        .onSnapshot(
          (snapshot) => {
            renderMessages(snapshot.docs);
            setStatus("불러오기 완료");
          },
          (error) => {
            console.error(error);
            setStatus("메시지를 불러오지 못했어. Firestore 설정을 확인해줘.", true);
          }
        );

    async function subscribePolitician(politicianId) {
      if (!currentUser) return;
      try {
        await db
          .collection("users")
          .doc(currentUser.uid)
          .collection("subscriptions")
          .doc(politicianId)
          .set({
            politicianId,
            subscribedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
      } catch (error) {
        console.error(error);
        setStatus("구독 실패", true);
      }
    }

    async function unsubscribePolitician(politicianId) {
      if (!currentUser) return;
      try {
        await db
          .collection("users")
          .doc(currentUser.uid)
          .collection("subscriptions")
          .doc(politicianId)
          .delete();

        if (selectedPoliticianId === politicianId) {
          selectedPoliticianId = subscribedIds.filter((id) => id !== politicianId)[0] || null;
        }
      } catch (error) {
        console.error(error);
        setStatus("구독 취소 실패", true);
      }
    }

    function startSubscriptionsListener() {
      if (!currentUser || !currentProfile || currentProfile.role !== "supporter") {
        subscribedIds = [];
        renderPoliticianList();
        renderMyRooms();
        renderRoomInfo();
        listenMessages();
        return;
      }

      if (unsubscribeSubscriptions) unsubscribeSubscriptions();

      unsubscribeSubscriptions = db
        .collection("users")
        .doc(currentUser.uid)
        .collection("subscriptions")
        .orderBy("subscribedAt", "asc")
        .onSnapshot(
          (snapshot) => {
            subscribedIds = snapshot.docs.map((doc) => doc.id);

            if (!selectedPoliticianId && subscribedIds.length > 0) {
              selectedPoliticianId = subscribedIds[0];
            }

            if (selectedPoliticianId && !subscribedIds.includes(selectedPoliticianId)) {
              selectedPoliticianId = subscribedIds[0] || null;
            }

            renderPoliticianList();
            renderMyRooms();
            renderRoomInfo();
            listenMessages();
          },
          (error) => {
            console.error(error);
            setStatus("구독 목록을 불러오지 못했어.", true);
          }
        );
    }

    async function handleSignedInUser(user) {
      currentUser = user;
      currentProfile = await loadUserProfile(user.uid);

      if (!currentProfile) {
        setStatus("사용자 프로필을 찾지 못했어.", true);
        await auth.signOut();
        return;
      }

      if (currentProfile.role === "politician") {
        selectedPoliticianId = currentProfile.politicianId || null;
      } else {
        selectedPoliticianId = null;
      }

      updateHeaderUI();
      closeAuth();
      renderPoliticianList();
      renderMyRooms();
      renderRoomInfo();
      startSubscriptionsListener();
    }

    function resetSignedOutUI() {
      currentUser = null;
      currentProfile = null;
      selectedPoliticianId = null;
      subscribedIds = [];

      if (unsubscribeMessages) unsubscribeMessages();
      if (unsubscribeSubscriptions) unsubscribeSubscriptions();

      updateHeaderUI();
      renderPoliticianList();
      renderMyRooms();
      renderRoomInfo();
      chatEl.innerHTML = "<div class='notice'>로그인 후 이용해줘.</div>";
      openAuth();
    }

    function initApp() {
      fillPoliticianSelect();
      setRoleTab("supporter");
      setModeTab("login");
      renderPoliticianList();
      renderMyRooms();
      renderRoomInfo();

      auth.onAuthStateChanged(async (user) => {
        if (user) {
          await handleSignedInUser(user);
        } else {
          resetSignedOutUI();
        }
      });
    }

    initApp();
